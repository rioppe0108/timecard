<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>しらはtimee</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --gold: #af9500;
            --bg: #f2f2f7
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            padding: 15px;
            display: flex;
            justify-content: center
        }

        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1)
        }

        h2 {
            text-align: center;
            margin: 0;
            color: #333
        }

        .user-name-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-name-input {
            border: none;
            border-bottom: 1px solid #ccc;
            text-align: center;
            color: #666;
            font-size: 14px;
            width: 80%;
            padding: 5px;
            background: transparent;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-in {
            background: var(--primary);
            color: white
        }

        .btn-out {
            background: var(--danger);
            color: white
        }

        .btn-save {
            background: var(--success);
            color: white;
            width: 100%;
            margin-top: 15px
        }

        .btn-cancel {
            background: #8e8e93;
            color: white;
            width: 100%;
            margin-top: 5px;
            display: none;
        }

        .btn-history {
            background: #444;
            color: white;
            width: 100%;
            margin-top: 10px
        }

        .btn-import {
            background: #5856d6;
            color: white;
            width: 100%;
            margin-top: 10px
        }

        button:disabled {
            background: #d1d1d6 !important;
            color: #8e8e93 !important;
            cursor: not-allowed
        }

        .edit-section {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px dashed #ccc
        }

        .edit-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 14px
        }

        .edit-row label {
            width: 50px;
            color: #666
        }

        .edit-row input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 5px;
            font-size: 15px;
            text-align: center
        }

        .result-box {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            color: #333;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px
        }

        textarea {
            width: 100%;
            border: 2px solid #d1d1d6;
            border-radius: 10px;
            padding: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background: #fafafa
        }

        #historyModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 380px;
            height: 85%;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px
        }

        .month-group {
            margin-bottom: 10px;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            overflow: hidden
        }

        .month-header {
            background: #f9f9f9;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            cursor: pointer
        }

        .month-content {
            display: none;
            padding: 10px;
            background: white
        }

        .history-item {
            border-bottom: 1px solid #eee;
            padding: 12px 0;
            font-size: 13px;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .item-btn {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
            flex: none;
        }

        .edit-btn { background: var(--primary); }
        .del-btn { background: #8e8e93; }
        .pay-btn { background: var(--gold); }
        
        .paid-badge {
            color: var(--success);
            font-weight: bold;
            font-size: 11px;
            background: #eaffea;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2 id="appTitle">しらはtimee</h2>
    <div class="user-name-container">
        <input type="text" id="userNameInput" class="user-name-input" placeholder="氏名を入力してください" onchange="saveUserName()">
    </div>
    <div class="btn-group">
        <button id="btnIn" class="btn-in" onclick="pressIn()">出勤</button>
        <button id="btnOut" class="btn-out" onclick="pressOut()" disabled>退勤</button>
    </div>
    <div class="edit-section">
        <div class="edit-row">
            <label>作業日</label>
            <input type="date" id="inputDate" onchange="calc()">
        </div>
        <div class="edit-row">
            <label>開始</label>
            <input type="time" id="inputIn" onchange="calc()">
        </div>
        <div class="edit-row">
            <label>終了</label>
            <input type="time" id="inputOut" onchange="calc()">
        </div>
    </div>
    <div class="result-box" id="resultLabel">合計: 0時間0分 (0円)</div>
    <label style="font-weight:bold;font-size:14px;display:block;margin-bottom:5px;color:var(--danger);">作業内容（必須）</label>
    <textarea id="memoField" rows="4" placeholder="例：料理手伝い、洗濯物片付けなど"></textarea>
    
    <button id="btnSave" class="btn-save" onclick="saveToHistory()" disabled>確定保存</button>
    <button id="btnUpdateCancel" class="btn-cancel" onclick="cancelEditMode()">編集をキャンセル</button>
    
    <button class="btn-history" onclick="toggleHistory(true)">過去の月別集計を表示</button>
</div>

<div id="historyModal" onclick="if(event.target==this)toggleHistory(false)">
    <div class="modal-content">
        <h3 style="margin:0 0 15px;text-align:center;font-size:16px;">勤務実績月別集計</h3>
        <div id="monthlyAccordion" class="history-list"></div>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <button class="btn-in" style="font-size:13px; padding:10px;" onclick="exportExcel()">Excel形式で保存</button>
            <button class="btn-import" style="font-size:13px; padding:10px;" onclick="document.getElementById('csvInput').click()">CSVからデータを復元</button>
            <input type="file" id="csvInput" style="display:none" accept=".csv" onchange="importCSV(this)">
            <button class="btn-history" style="background:#444; font-size:13px; padding:10px;" onclick="toggleHistory(false)">閉じる</button>
        </div>
    </div>
</div>

<script>
    const HOURLY_WAGE = 1000;
    const STORAGE_KEY = "shiraha_timeee_final_v1";
    const USER_NAME_KEY = "shiraha_timeee_user_name";
    let calculatedAmount = 0;
    let editingId = null;

    window.onload = function () {
        const today = new Date().toISOString().substr(0, 10);
        document.getElementById('inputDate').value = today;
        
        // 保存された氏名を復元
        const savedName = localStorage.getItem(USER_NAME_KEY);
        if (savedName) {
            document.getElementById('userNameInput').value = savedName;
        }
        
        setBtnState('start');
    };

    function saveUserName() {
        const name = document.getElementById('userNameInput').value;
        localStorage.setItem(USER_NAME_KEY, name);
    }

    function setBtnState(state) {
        if(editingId) return;
        document.getElementById('btnIn').disabled = (state !== 'start');
        document.getElementById('btnOut').disabled = (state !== 'working');
        document.getElementById('btnSave').disabled = (state !== 'done');
    }

    function pressIn() {
        const now = new Date();
        document.getElementById('inputIn').value = now.toTimeString().substr(0, 5);
        setBtnState('working');
        calc();
    }

    function pressOut() {
        const now = new Date();
        document.getElementById('inputOut').value = now.toTimeString().substr(0, 5);
        setBtnState('done');
        calc();
    }

    function calc() {
        const dateVal = document.getElementById('inputDate').value, inVal = document.getElementById('inputIn').value,
            outVal = document.getElementById('inputOut').value;
        if (!inVal || !outVal) return;
        const start = new Date(`${dateVal}T${inVal}`), end = new Date(`${dateVal}T${outVal}`);
        let diff = end - start;
        if (diff < 0) diff += 86400000;
        const mins = Math.floor(diff / 60000);
        calculatedAmount = Math.floor((HOURLY_WAGE / 60) * mins);
        document.getElementById('resultLabel').innerText = `合計: ${Math.floor(mins / 60)}時間${mins % 60}分 (${calculatedAmount.toLocaleString()}円)`;
    }

    function saveToHistory() {
        const note = document.getElementById('memoField').value.trim();
        if (note === "") return alert("作業内容を入力してください");
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        
        const dateInput = document.getElementById('inputDate').value;
        const formattedDate = dateInput.replace(/-/g, '/');
        const resultText = document.getElementById('resultLabel').innerText.split(' ')[1];
        const currentName = document.getElementById('userNameInput').value || "未設定";

        if (editingId) {
            history = history.map(item => {
                if(item.id === editingId) {
                    return { ...item, date: formattedDate, start: document.getElementById('inputIn').value, end: document.getElementById('inputOut').value, duration: resultText, amount: calculatedAmount, note: note, name: currentName };
                }
                return item;
            });
            alert("データを更新しました！");
            cancelEditMode();
        } else {
            history.unshift({
                id: Date.now(), date: formattedDate, start: document.getElementById('inputIn').value, end: document.getElementById('inputOut').value,
                duration: resultText, amount: calculatedAmount, note: note, isPaid: false, name: currentName
            });
            alert("データを保存しました！");
        }
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        resetForm();
    }

    function resetForm() {
        document.getElementById('inputIn').value = "";
        document.getElementById('inputOut').value = "";
        document.getElementById('memoField').value = "";
        document.getElementById('resultLabel').innerText = "合計: 0時間0分 (0円)";
        setBtnState('start');
    }

    function editItem(id) {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY));
        const item = history.find(i => i.id === id);
        if (!item) return;
        editingId = id;
        document.getElementById('inputDate').value = item.date.replace(/\//g, '-');
        document.getElementById('inputIn').value = item.start;
        document.getElementById('inputOut').value = item.end;
        document.getElementById('memoField').value = item.note;
        document.getElementById('btnSave').innerText = "上書き更新";
        document.getElementById('btnSave').disabled = false;
        document.getElementById('btnUpdateCancel').style.display = "block";
        document.getElementById('btnIn').disabled = true;
        document.getElementById('btnOut').disabled = true;
        document.getElementById('appTitle').innerText = "編集モード";
        document.getElementById('appTitle').style.color = "var(--primary)";
        toggleHistory(false);
        calc();
        window.scrollTo(0,0);
    }

    function cancelEditMode() {
        editingId = null;
        document.getElementById('btnSave').innerText = "確定保存";
        document.getElementById('btnUpdateCancel').style.display = "none";
        document.getElementById('appTitle').innerText = "しらはtimee";
        document.getElementById('appTitle').style.color = "#333";
        resetForm();
    }

    function deleteItem(id) {
        if (!confirm("このデータを完全に削除してもよろしいですか？")) return;
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY));
        history = history.filter(item => item.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        renderMonthlyHistory();
    }

    function markAsPaid(id) {
        if (!confirm("精算完了にしますか？")) return;
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY));
        history = history.map(item => item.id === id ? {...item, isPaid: true} : item);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        renderMonthlyHistory();
    }

    function toggleHistory(show) {
        const modal = document.getElementById('historyModal');
        if (show) {
            renderMonthlyHistory();
            modal.style.display = 'flex';
        } else {
            modal.style.display = 'none';
        }
    }

    function renderMonthlyHistory() {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"),
            container = document.getElementById('monthlyAccordion');
        container.innerHTML = "";
        const groups = {};
        history.forEach(item => {
            const m = item.date.substr(0, 7);
            if (!groups[m]) groups[m] = [];
            groups[m].push(item);
        });
        Object.keys(groups).sort().reverse().forEach(month => {
            const monthData = groups[month], monthTotal = monthData.reduce((s, i) => s + i.amount, 0),
                groupDiv = document.createElement('div');
            groupDiv.className = 'month-group';
            let itemsHtml = monthData.map(item => `
                <div class="history-item">
                    <strong>${item.date.split('/')[2]}日</strong> ${item.start}-${item.end} (${item.duration})
                    ${item.isPaid ? '<span class="paid-badge">精算済み</span>' : ''}
                    <br><span style="color:#666; font-size:12px;">${item.note}</span><br>
                    <span style="font-weight:bold;">${item.amount.toLocaleString()}円</span>
                    <div class="action-btns">
                        <button class="item-btn edit-btn" onclick="event.stopPropagation(); editItem(${item.id})">編集</button>
                        <button class="item-btn del-btn" onclick="event.stopPropagation(); deleteItem(${item.id})">削除</button>
                        ${!item.isPaid ? `<button class="item-btn pay-btn" onclick="event.stopPropagation(); markAsPaid(${item.id})">精算</button>` : ''}
                    </div>
                </div>`).join('');
            groupDiv.innerHTML = `
                <div class="month-header" onclick="const c=this.nextElementSibling; c.style.display=(c.style.display==='block'?'none':'block')">
                    <span>${month.replace('/', '年')}月 (${monthData.length}回)</span>
                    <span style="color:var(--danger)">${monthTotal.toLocaleString()}円 ▼</span>
                </div>
                <div class="month-content">${itemsHtml}</div>`;
            container.appendChild(groupDiv);
        });
    }

    function exportExcel() {
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!history || history.length === 0) return alert("データがありません");
        const currentName = document.getElementById('userNameInput').value || "名称未設定";
        let csvContent = "日付,出勤,退勤,勤務時間,金額,作業内容,精算ステータス\n";
        history.forEach(i => {
            let status = i.isPaid ? "精算済み" : "未精算";
            csvContent += `${i.date},${i.start},${i.end},${i.duration},${i.amount},"${i.note.replace(/"/g, '""')}",${status}\n`;
        });
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], {type: "text/csv;charset=utf-8"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `勤務実績_${currentName}.csv`;
        link.click();
    }

    function importCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        const currentName = document.getElementById('userNameInput').value || "名称未設定";
        reader.onload = function(e) {
            try {
                const text = e.target.result;
                const lines = text.split("\n");
                let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
                let count = 0;

                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (row.length < 6) continue;
                    
                    const date = row[0].trim();
                    const start = row[1].trim();
                    const end = row[2].trim();
                    const duration = row[3].trim();
                    const amount = parseInt(row[4].replace(/[^0-9]/g, ''));
                    const note = row[5].replace(/^"|"$/g, '').replace(/""/g, '"').trim();
                    const isPaid = row[6] ? row[6].includes("精算済み") : false;

                    history.push({
                        id: Date.now() + i, date, start, end, duration, amount, note, isPaid, name: currentName
                    });
                    count++;
                }
                
                history.sort((a, b) => new Date(b.date.replace(/\//g, '-')) - new Date(a.date.replace(/\//g, '-')));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
                renderMonthlyHistory();
                alert(`${count}件のデータを復元しました。`);
            } catch (err) {
                alert("ファイルの読み込みに失敗しました。正しいCSVファイルか確認してください。");
            }
            input.value = "";
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
